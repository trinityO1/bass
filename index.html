<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Fullscreen Video</title>
    <style>
        /* 1. Reset everything to prevent weird white borders */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 2. Prevents annoying scrollbars from appearing */
            background-color: #000;
        }

        /* 3. Stretch the video to fill the viewport */
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 4. 'cover' zooms the video slightly to fill the screen without leaving black bars. */
        }
    </style>
</head>
<body>

    <video src="myvideo.mp4" autoplay muted playsinline loop></video>

</body>
</html>
